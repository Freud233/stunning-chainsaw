<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(190, 147, 147);
        }

        .box {
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            text-align: center;
            padding-top: 60px;
        }

        .item {
            margin-left: 100px;
            position: absolute;
            transform-style: preserve-3d;
        }

        span {
            display: inline-block;
            letter-spacing: 80px;
            font-size: 150px;
            transform-origin: 0 80px;
        }

        .item:nth-of-type(1) span {
            color: rgba(132, 128, 194, 0.5);
            transform: skew(-8deg, 20deg);
        }

        .item:nth-of-type(2) span {
            color: rgba(78, 190, 125, 0.9);
            transform: rotateY(-70deg) rotateZ(5deg);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="item">
            <span>幼</span>
            <span>稚</span>
            <span>园</span>
            <span>杀</span>
            <span>手</span>
        </div>
        <div class="item">
            <span>幼</span>
            <span>稚</span>
            <span>园</span>
            <span>杀</span>
            <span>手</span>
        </div>
        <div class="item">
            <span>幼</span>
            <span>稚</span>
            <span>园</span>
            <span>杀</span>
            <span>手</span>
        </div>
    </div>
</body>

</html>
