<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>

        body {
            background-color: gray;
        }
        .box {
            width: 600px;
            height: 600px;
            /* background-color: rgba(182, 51, 58, 0.952); */
            margin: 50px auto;
            /* padding-top: 30px; */
        }

        .heart {
            width: 400px;
            height: 600px;
            background-color: red;
            transform: rotateZ(45deg);
            margin: 0 auto;
            border-radius:  200px 200px 0 0;
            position: relative;
            box-shadow: 3px -5px 50px 19px rgba(202, 22, 32, 0.79);
            animation: jump 2s linear infinite;
            /* margin-top: 100px; */
        }

        .heart::before {
            position: absolute;
            content: "";
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background-color: red;
            left: -200px;
            bottom: 0;
            box-shadow: -34px 0px 50px 1px rgba(202, 22, 32, 0.79);
            /* box-shadow: -38px -4px 50px 1px rgba(202, 22, 32, 0.79); */
        }

        @keyframes jump{
            0% {
               transform: scale(1) rotateZ(45deg);
           }
           20% {
               transform: scale(0.9) rotateZ(45deg);
           }

            80% {
               transform: scale(1.1) rotateZ(45deg);
           }
           100% {
               transform: scale(1) rotateZ(45deg);
           }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="heart"></div>
    </div>
</body>
</html>
