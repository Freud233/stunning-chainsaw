<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        ul,
        li {
            list-style: none;
        }

        .wrap {
            margin: 50px auto;
            width: 80%;
            /* height: 800px; */
            /* border: 1px solid red; */
            perspective: 2000px;

        }

        .content {
            width: 80%;
            height: 400px;
            position: relative;
            margin: 0 auto;
            transform-style: preserve-3d;
            /* transition: all 4s; */
            /* border: 1px solid red; */
        }

        .content li img {
            position: absolute;
            margin-top: 40px;
            left: 30%;
            width: 300px;
        }

        .content li:nth-of-type(1) img {
            left: 50%;
            transform: translateX(-50%);
            height: 225px;
        }

        .content li:nth-of-type(2) img {
            transform: translateZ(400px);
        }

        .content li:nth-of-type(3) img {
            transform: rotateY(-60deg) translateZ(400px);
        }

        .content li:nth-of-type(4) img {
            transform: rotateY(-120deg) translateZ(400px);
        }

        .content li:nth-of-type(5) img {
            transform: rotateY(-180deg) translateZ(400px);
        }

        .content li:nth-of-type(6) img {
            transform: rotateY(60deg) translateZ(400px);
        }

        .content li:nth-of-type(7) img {
            transform: rotateY(120deg) translateZ(400px);
        }
    </style>

</head>

<body>
    <div class="wrap">
        <div class="content">
            <ul>
                <li><img src="./images/dog2.jpg" alt=""></li>
                <li><img src="./images/dog.gif" alt=""></li>
                <li><img src="./images/dog.gif" alt=""></li>
                <li><img src="./images/dog.gif" alt=""></li>
                <li><img src="./images/dog.gif" alt=""></li>
                <li><img src="./images/dog.gif" alt=""></li>
                <li><img src="./images/dog.gif" alt=""></li>
            </ul>
        </div>
    </div>
    <script>
        var content = document.querySelector(".content");
        var count = 0;

        function getRotate() {
            timeId = setInterval(() => {
                count += 1;
                content.style.transform = "rotateY(" + -count + "deg)";
                console.log(count);

            }, 15);
        }
        getRotate();
        content.onmouseover = function () {
            clearInterval(timeId);
        }

        content.onmouseout = function () {
            getRotate();
        }

    </script>
</body>

</html>
