<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            display: flex;
            justify-content: space-around;
        }

       .ul1 {
            animation: goRotate 2s linear infinite;
        }

       .ul2 {
            animation: goRotate 2s .3s linear infinite;
        }

        .box ul:nth-of-type(3) {
            animation: goRotate 2s .6s linear infinite;
        }

        .box ul:nth-of-type(4) {
            animation: goRotate 2s .9s linear infinite;
        }

        .box ul:nth-of-type(5) {
            animation: goRotate 2s 1.2s linear infinite;
        }

        .box ul:nth-of-type(6) {
            animation: goRotate 2s 1.5s linear infinite;
        }

        .box ul:nth-of-type(7) {
            animation: goRotate 2s 1.8s linear infinite;
        }

        .box ul:nth-of-type(8) {
            animation: goRotate 2s 2.1s linear infinite;
        }

        .box ul:nth-of-type(9) {
            animation: goRotate 2s 2.4s linear infinite;
        }

        ul {
            list-style: none;
            display: flex;
            width: 150px;
            height: 250px;
            background-color: gray;
            border-radius: 20px;
            justify-content: center;
        }

        li {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: skyblue;
        }

        ul:nth-child(1) li:nth-child(1) {
            align-self: center;
        }

        ul:nth-child(2) {
            justify-content: space-around;
            flex-direction: column;
            align-items: center;
        }

        ul:nth-child(3) li {
            margin: 10px 0;
        }

        ul:nth-child(3) li:nth-child(2) {
            align-self: center;
        }

        ul:nth-child(3) li:nth-child(3) {
            align-self: flex-end;
        }

        ul:nth-child(4) {
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }

        ul:nth-child(4) li {
            margin: 0 10px;
        }

        ul:nth-child(5) {
            align-items: center;
            flex-wrap: wrap;
        }

        ul:nth-child(5) li {
            margin: 0 10px;
        }

        ul:nth-child(5) li:nth-child(3) {
            margin: 0 30px;
        }

        ul:nth-child(6) {
            flex-wrap: wrap;
            align-items: center;
        }

        ul:nth-child(6) li {
            margin: 0 10px;
        }

        ul:nth-child(7) {
            display: flex;
            flex-direction: column;
        }

        ul:nth-child(7) ul:nth-of-type(1) {
            padding-top: 10px;
            flex: 1;
            display: flex;
        }

        ul:nth-child(7) ul:nth-of-type(1) li:nth-child(1) {
            align-self: flex-start;
        }

        ul:nth-child(7) ul:nth-of-type(1) li:nth-child(2) {
            align-self: center;
        }

        ul:nth-child(7) ul:nth-of-type(1) li:nth-child(3) {
            align-self: flex-end;
        }

        ul:nth-child(7) ul:nth-of-type(2) {
            flex: 1;
            flex-direction: row;
            display: flex;
            flex-wrap: wrap;
        }

        ul:nth-child(7) ul:nth-of-type(2) li {
            margin: 0 10px;
        }

        ul:nth-child(8) {
            flex-wrap: wrap;
            align-items: center;
        }

        ul:nth-child(9) {
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
        }

        ul:nth-child(8) li {
            margin: 0 10px;
        }

        @keyframes goRotate {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="box">
        <ul class="ul1">
            <li></li>
        </ul>

        <ul class="ul2">
            <li></li>
            <li></li>
        </ul>

        <ul>
            <li></li>
            <li></li>
            <li></li>
        </ul>

        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>

        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>


        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>


        <ul>
            <ul>
                <li></li>
                <li></li>
                <li></li>
            </ul>
            <ul>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </ul>
        </ul>
        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>

        <ul>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
    </div>
</body>

</html>
