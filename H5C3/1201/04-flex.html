<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        div {
            width: 500px;
            height: 400px;
            border: 1px solid #ccc;
            margin: 100px auto;
        }

        ul {
            list-style: none;
            width: 100%;
            display: flex;
        }

        li{ 
            flex: 1;
            text-align: center;
            border: 1px solid red;
            background-color: rgb(192, 192, 192);
        }
    </style>
</head>
<body>
    <div>
        <ul>
            <li>首页</li>
            <li>是否</li>
            <li>水电费是否</li>
            <li>大风刮过</li>
            <li>驱蚊器翁</li>
        </ul>
    </div>
</body>
</html>
