<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .box {
            width: 480px;
            height: 480px;
            border: 1px solid black;
            margin: 50px auto 0;
            background-image: url("./images/erik_ce204002.jpg");    
            /* background-repeat: no-repeat; */
        }

        button {
            width: 100px;
            height: 50px;
            display: block;
            margin: 20px auto;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div class="box"></div>
    <button>点我</button>
    <script>
        var btn = document.querySelector("button");
        var box = document.querySelector(".box");

        btn.onclick = function () {
            var index = 0;
            var step = 480;
            setInterval(() => {
                index -= step;
                console.log(index);
            box.style.backgroundPositionY = index + 'px';
            }, 120);
        }
    </script>
</body>

</html>
