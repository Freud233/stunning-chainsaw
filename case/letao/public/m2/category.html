<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Hello MUI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <!--标准mui.css-->
    <link rel="stylesheet" href="../m/assets/mui/css/mui.min.css">
    <link type="image/x-icon" rel="shortcut icon" href="../m/images/favicon.ico">
    <!--App自定义的css-->
    <link rel="stylesheet" href="./less/index.css">
    <link rel="stylesheet" href="./less/category.css">
</head>

<body>
    <!-- 头部 -->
    <header class="mui-bar mui-bar-nav">
        <a class="mui-action-back mui-icon mui-icon-search mui-pull-right"></a>
        <h1 class="mui-title">乐淘云购</h1>
    </header>
    <!-- 底部导航 -->
    <nav class="mui-bar mui-bar-tab">
        <a class="mui-tab-item mui-active" href="#tabbar">
            <span class="mui-icon mui-icon-home"></span>
            <span class="mui-tab-label">首页</span>
        </a>
        <a class="mui-tab-item" href="#tabbar-with-chat">
            <span class="mui-tab-label">消息</span>
        </a>
        <a class="mui-tab-item" href="#tabbar-with-contact">
            <span class="mui-icon fa fa-icon-shopping"></span>
            <span class="mui-tab-label">通讯录</span>
        </a>
        <a class="mui-tab-item" href="#tabbar-with-map">
            <span class="mui-icon mui-icon-gear"></span>
            <span class="mui-tab-label">设置</span>
        </a>
    </nav>
    <!-- 分类 -->
    <div class="category_content">
        <div class="category_left mui-scroll-wrapper">
            <ul class="category_left_ul mui-scroll">

            </ul>
        </div>
        <div class="category_right">
            <div class="mui-scroll-wrapper">
                <ul class="category_right_ul mui-scroll"></ul>
            </div>    
        </div>
    </div>
    <!-- 分类引擎模板 -->
    <script id="category_list" type="text/template">
            <% for(var i = 0; i < obj.length;i++){%>
                <a data-id="<%=obj[i].id%>"><%=obj[i].categoryName%></a>
            <% }%>        
    </script>
    <script id="category_list_content" type="text/template">
        <% for(var i = 0; i < obj.length;i++){%>
            <li>
                <a href="#">
                    <img src="<%=obj[i].brandLogo%>" alt="">
                    <p><%=obj[i].brandName%></p>
                </a>
            </li>
        <% }%>        
</script>
    <script src="../m/assets/mui/js/mui.min.js"></script>
    <script src="../m/assets/artTemplate/template-native.js"></script>
    <script src="./js/zepto.min.js"></script>
    <script src="./js/category.js"></script>
</body>

</html>
