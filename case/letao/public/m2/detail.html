<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Document</title>
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
	<link rel="stylesheet" href="../m/assets/mui/css/mui.min.css">
	<link rel="stylesheet" href="../m/css/base.css">
	<link rel="stylesheet" href="../m/css/detail.css">
	<script src="../m/assets/zepto/zepto.min.js"></script>
	<script src="../m/assets/artTemplate/template-native.js"></script>
	<script src="../m/assets/mui/js/mui.min.js"></script>
	<script src="../m/js/public.js"></script>
	<script src="js/detail.js"></script>
	<style>
		.size {
			margin: 2px;
			float: left;
			border: 1px solid red;
		}
		.size.active {
			background-color: red;
		}
		.sizeBox {
			overflow: hidden;
		}
		.slideshow {
			padding: 0 !important;
		}
		.shoppingTrolley {
			display: flex;
		}
		.shoppingTrolley a {
			text-align: center;
			flex: 1;
			padding: 5px 10px;
		}
		.shoppingTrolley a:nth-of-type(1) {
			background-color: rgb(196, 23, 23);
		}
		.shoppingTrolley a:nth-of-type(2) {
			background-color: rgb(40, 146, 49);
		}
	</style>
</head>
<body>
	<header class="mui-bar mui-bar-nav my-header">
		<h1 class="mui-title">商品详情</h1>
	</header>
	<nav class="mui-bar mui-bar-tab my-footer">
		<a class="mui-tab-item" href="index.html">
			<span class="mui-icon mui-icon-home"></span>
			<span class="mui-tab-label">首页</span>
		</a>
		<a class="mui-tab-item" href="category.html">
			<span class="mui-icon mui-icon-bars"></span>
			<span class="mui-tab-label">分类</span>
		</a>
		<a class="mui-tab-item" href="cart.html">
			<span class="mui-icon iconfont icon-daohanggouwuche"></span>
			<span class="mui-tab-label">购物车</span>
		</a>
		<a class="mui-tab-item" href="user.html">
			<span class="mui-icon mui-icon-person"></span>
			<span class="mui-tab-label">会员中心</span>
		</a>
	</nav>
	<!-- <div class="mui-content"> -->
		
		<!-- 轮播图 -->
		<div class="mui-content slideshow">
			
		</div>
		<div class="countBox">
			
		</div>
		
	<!-- </div> -->
	<script type="text/template" id="detailSlide">
		<div class="mui-slider">
			<div class="mui-slider-group mui-slider-loop">
				<!--支持循环，需要重复图片节点-->
				<div class="mui-slider-item mui-slider-item-duplicate"><a href="#"><img src="../m/images/<%=pic[0].picName%>" /></a></div>
				<div class="mui-slider-item"><a href="#"><img src="../m/images/<%=pic[0].picName%>" /></a></div>
				<div class="mui-slider-item"><a href="#"><img src="../m/images/<%=pic[0].picName%>" /></a></div>
				<div class="mui-slider-item"><a href="#"><img src="../m/images/<%=pic[0].picName%>" /></a></div>
				<div class="mui-slider-item"><a href="#"><img src="../m/images/<%=pic[0].picName%>" /></a></div>
				<!--支持循环，需要重复图片节点-->
				<div class="mui-slider-item mui-slider-item-duplicate"><a href="#"><img src="../m/images/<%=pic[0].picName%>" /></a></div>
			</div>
			<div class="mui-slider-indicator">
				<div class="mui-indicator mui-active"></div>
				<div class="mui-indicator"></div>
				<div class="mui-indicator"></div>
				<div class="mui-indicator"></div>
			</div>
		</div>
		<h4><%=proName %></h4>
		<p><span>原价:<%=oldPrice%></span><span>现价:<%=price%></span></p>
		<div class="sizeBox">
			尺码
			<ul>
				<% var size = size.split("-");%>
				<% for(var i = size[0]; i < size[1];i++){%>
				<span class="size"><%=i %></span class="size">
				<%}%>
			</ul>
		</div>
		<div class="mui-numbox" data-numbox-step='1' data-numbox-min='1' data-numbox-max='<%=num%>'>
			<button class="mui-btn mui-numbox-btn-minus" type="button">-</button>
			<input class="mui-numbox-input" type="number"  value="1"/>
			<button class="mui-btn mui-numbox-btn-plus" type="button">+</button>
		</div>
		<span >库存: <b class="kucun"><%=num%></b></span>	
		<div class="shoppingTrolley">
			<a href="cart.html">查看购物车</a>
			<a class="addShopping" href="#">加入购物车</a>
		</div>
	</script>

</body>
</html>
